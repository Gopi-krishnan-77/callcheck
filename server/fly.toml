# fly.toml — generated template, customised after `fly launch`
# Replace "callcheck-echo" with the name you chose during fly launch.

app = "callcheck-echo"
primary_region = "bom"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "udp"
  internal_port = 10000

  [[services.ports]]
    port = 10000

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
