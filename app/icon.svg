<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sweep-glow">
      <feGaussianBlur stdDeviation="0.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#020b18"/>

  <!-- Radar rings -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#1a6b8a" stroke-width="0.9" opacity="0.7"/>
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#1a6b8a" stroke-width="0.8" opacity="0.5"/>
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#1a6b8a" stroke-width="0.7" opacity="0.4"/>

  <!-- Crosshairs -->
  <line x1="3" y1="16" x2="29" y2="16" stroke="#1a6b8a" stroke-width="0.4" opacity="0.35"/>
  <line x1="16" y1="3" x2="16" y2="29" stroke="#1a6b8a" stroke-width="0.4" opacity="0.35"/>

  <!-- Sweep line toward upper-right -->
  <line x1="16" y1="16" x2="27.5" y2="6.5" stroke="#89dc12" stroke-width="1.2" opacity="0.85" filter="url(#sweep-glow)"/>

  <!-- Green blip with glow -->
  <circle cx="24" cy="9.5" r="2" fill="#89dc12" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.2" fill="#1a6b8a" opacity="0.9"/>
</svg>
